apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-test
  template:
    metadata:
      labels:
        app: java-test
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: java-test
          image: IMAGE_NAME
          ports:
            - containerPort: 8080
